<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>The Organism</title>
</head>
<body>

<!-- TAB BAR -->
<div id="tab-bar">
  <button class="tab active" data-tab="main">Neural</button>
  <button class="tab" data-tab="mural">Mural</button>
  <div id="tab-right">
    <div id="phase-row">
      <div id="phase-dot"></div>
      <div id="phase-text">waiting</div>
    </div>
    <div id="conn" class="disconnected">
      <div id="conn-dot"></div><span id="conn-text">Disconnected</span>
    </div>
  </div>
</div>

<div id="pages">

  <!-- PAGE: NEURAL -->
  <div id="page-main" class="page active">

    <!-- Col 1: spine -->
    <div id="spine-col">
      <div id="spine-title">neural spine</div>
      <div id="spine-scroll"></div>
      <div id="embed-section">
        <div id="embed-label">color embedding</div>
        <canvas id="embed-canvas" width="8" height="8"></canvas>
      </div>
    </div>

    <!-- Col 2: specimen -->
    <div id="specimen-col">
      <div class="section-label">Specimen</div>
      <div id="best-wrap">
        <canvas id="best-piece" width="16" height="16"></canvas>
        <canvas id="confidence-overlay" width="16" height="16"></canvas>
      </div>
      <div id="best-meta">
        <div class="row"><span class="lbl">score</span><span class="val" id="meta-score">&mdash;</span></div>
        <div class="row"><span class="lbl">gen</span><span class="val" id="meta-gen">&mdash;</span><span class="lbl" style="margin-left:8px">temp</span><span class="val" id="meta-temp">&mdash;</span></div>
      </div>
      <div class="section-label">Elite</div>
      <div id="elite-strip"></div>
    </div>

    <!-- Col 3: colony -->
    <div id="colony-col">
      <div class="section-label" style="padding:0 10px">Colony</div>
      <div id="gallery"></div>
    </div>

    <!-- Bottom bar -->
    <div id="main-bottom">
      <div class="chart-cell">
        <div class="chart-title">Loss</div>
        <svg id="loss-chart" viewBox="0 0 200 36" preserveAspectRatio="none">
          <polyline class="sparkline sl-loss sl-glow" points=""/>
          <polyline class="sparkline sl-loss" points=""/>
        </svg>
      </div>
      <div class="chart-cell">
        <div class="chart-title">Gradient</div>
        <svg id="grad-chart" viewBox="0 0 200 36" preserveAspectRatio="none">
          <polyline class="sparkline sl-grad sl-glow" points=""/>
          <polyline class="sparkline sl-grad" points=""/>
        </svg>
      </div>
      <div id="stats-cell">
        <div class="label">Gen</div><div class="value" id="stat-gen">&mdash;</div>
        <div class="label">Temp</div><div class="value" id="stat-temp">&mdash;</div>
        <div class="label">Loss</div><div class="value" id="stat-loss">&mdash;</div>
        <div class="label">Phase</div><div class="value" id="stat-phase">&mdash;</div>
      </div>
    </div>

  </div><!-- /page-main -->

  <!-- PAGE: MURAL -->
  <div id="page-mural" class="page">

    <!-- Slim toolbar — always visible -->
    <div id="mural-toolbar">
      <button id="mural-mode-btn" title="Switch mode">Wallpaper</button>
      <div class="toolbar-sep"></div>
      <button id="mural-pause-btn" class="tool-icon-btn" title="Pause / Play (Space)">&#x23F8;</button>
      <button id="mural-fullscreen-btn" class="tool-icon-btn" title="Fullscreen (F)">&#x26F6;</button>
      <button id="mural-crt-btn" class="tool-icon-btn" title="CRT effect (C)">CRT</button>
      <button id="mural-settings-toggle" class="tool-icon-btn" title="Settings">&#x2699;</button>
      <div class="toolbar-status">
        <span id="mural-gen-info"></span>
        <span id="mural-phase"></span>
      </div>
    </div>

    <!-- Collapsible settings panel -->
    <div id="mural-settings" class="collapsed">
      <div class="settings-grid">

        <!-- Display group -->
        <div class="settings-group">
          <div class="group-title">Display</div>
          <label class="setting-row">
            <span class="setting-label">Tile size</span>
            <div class="setting-control">
              <input type="range" id="range-tile" min="0" max="10" step="1" value="5">
              <span class="setting-value" id="zoom-val">16px</span>
            </div>
          </label>
          <label class="setting-row">
            <span class="setting-label">Rotate tiles</span>
            <div class="setting-control">
              <button id="mural-rotate-btn" class="toggle-btn active" role="switch" aria-checked="true">ON</button>
            </div>
          </label>
        </div>

        <!-- Timing group -->
        <div class="settings-group">
          <div class="group-title">Timing</div>
          <label class="setting-row">
            <span class="setting-label" id="transition-label">Cycle</span>
            <div class="setting-control">
              <input type="range" id="range-transition" min="500" max="15000" step="500" value="3500">
              <span class="setting-value" id="transition-val">3.5s</span>
            </div>
          </label>
          <label class="setting-row" id="flip-row">
            <span class="setting-label" id="flip-label">Rotation</span>
            <div class="setting-control">
              <input type="range" id="range-flip" min="100" max="10000" step="500" value="3500">
              <span class="setting-value" id="flip-val">3.5s</span>
            </div>
          </label>
        </div>

        <!-- Audio group -->
        <div class="settings-group">
          <div class="group-title">Audio</div>
          <label class="setting-row">
            <span class="setting-label">Sound</span>
            <div class="setting-control">
              <button id="mural-sound-btn" class="toggle-btn" role="switch" aria-checked="false">OFF</button>
            </div>
          </label>
          <label class="setting-row">
            <span class="setting-label">Volume</span>
            <div class="setting-control">
              <input type="range" id="range-volume" min="0" max="100" step="5" value="60">
              <span class="setting-value" id="vol-val">60%</span>
            </div>
          </label>
        </div>

      </div>
    </div>

    <div id="mural-canvas-wrap">
      <canvas id="mural-canvas"></canvas>
      <div id="mural-overlay">no pieces yet</div>
    </div>
  </div>

</div><!-- /pages -->

<script type="module" src="/src/main.js"></script>
</body>
</html>
