<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Organism</title>
</head>
<body>

<!-- TAB BAR -->
<div id="tab-bar">
  <button class="tab active" data-tab="main">Neural</button>
  <button class="tab" data-tab="mural">Mural</button>
  <div id="tab-right">
    <div id="phase-row">
      <div id="phase-dot"></div>
      <div id="phase-text">waiting</div>
    </div>
    <div id="conn" class="disconnected">
      <div id="conn-dot"></div><span id="conn-text">Disconnected</span>
    </div>
  </div>
</div>

<div id="pages">

  <!-- PAGE: NEURAL -->
  <div id="page-main" class="page active">

    <!-- Col 1: spine -->
    <div id="spine-col">
      <div id="spine-title">neural spine</div>
      <div id="spine-scroll"></div>
      <div id="embed-section">
        <div id="embed-label">color embedding</div>
        <canvas id="embed-canvas" width="8" height="8"></canvas>
      </div>
    </div>

    <!-- Col 2: specimen -->
    <div id="specimen-col">
      <div class="section-label">Specimen</div>
      <div id="best-wrap">
        <canvas id="best-piece" width="16" height="16"></canvas>
        <canvas id="confidence-overlay" width="16" height="16"></canvas>
      </div>
      <div id="best-meta">
        <div class="row"><span class="lbl">score</span><span class="val" id="meta-score">&mdash;</span></div>
        <div class="row"><span class="lbl">gen</span><span class="val" id="meta-gen">&mdash;</span><span class="lbl" style="margin-left:8px">temp</span><span class="val" id="meta-temp">&mdash;</span></div>
      </div>
      <div class="section-label">Elite</div>
      <div id="elite-strip"></div>
    </div>

    <!-- Col 3: colony -->
    <div id="colony-col">
      <div class="section-label" style="padding:0 10px">Colony</div>
      <div id="gallery"></div>
    </div>

    <!-- Bottom bar -->
    <div id="main-bottom">
      <div class="chart-cell">
        <div class="chart-title">Loss</div>
        <svg id="loss-chart" viewBox="0 0 200 36" preserveAspectRatio="none">
          <polyline class="sparkline sl-loss sl-glow" points=""/>
          <polyline class="sparkline sl-loss" points=""/>
        </svg>
      </div>
      <div class="chart-cell">
        <div class="chart-title">Gradient</div>
        <svg id="grad-chart" viewBox="0 0 200 36" preserveAspectRatio="none">
          <polyline class="sparkline sl-grad sl-glow" points=""/>
          <polyline class="sparkline sl-grad" points=""/>
        </svg>
      </div>
      <div id="stats-cell">
        <div class="label">Gen</div><div class="value" id="stat-gen">&mdash;</div>
        <div class="label">Temp</div><div class="value" id="stat-temp">&mdash;</div>
        <div class="label">Loss</div><div class="value" id="stat-loss">&mdash;</div>
        <div class="label">Phase</div><div class="value" id="stat-phase">&mdash;</div>
      </div>
    </div>

  </div><!-- /page-main -->

  <!-- PAGE: MURAL -->
  <div id="page-mural" class="page">
    <div id="mural-toolbar">
      <span class="tool-label">Tile</span>
      <button class="zoom-btn" id="btn-zoom-out">&minus;</button>
      <span id="zoom-val">16px</span>
      <button class="zoom-btn" id="btn-zoom-in">+</button>
      <span class="tool-label">Transition</span>
      <button class="zoom-btn" id="btn-transition-down">&minus;</button>
      <span id="transition-val">3.5s</span>
      <button class="zoom-btn" id="btn-transition-up">+</button>
      <span class="tool-label">Flip</span>
      <button class="zoom-btn" id="btn-flip-down">&minus;</button>
      <span id="flip-val">3.5s</span>
      <button class="zoom-btn" id="btn-flip-up">+</button>
      <button id="mural-pause-btn" class="zoom-btn">&#x23F8;</button>
      <button id="mural-rotate-btn" class="active">Rotate &#x2713;</button>
      <button id="mural-mode-btn">Wallpaper</button>
      <button id="mural-sound-btn">Sound</button>
      <button class="zoom-btn" id="btn-vol-down">&minus;</button>
      <span id="vol-val">60%</span>
      <button class="zoom-btn" id="btn-vol-up">+</button>
      <span id="mural-gen-info"></span>
      <span id="mural-phase"></span>
    </div>
    <div id="mural-canvas-wrap">
      <canvas id="mural-canvas"></canvas>
      <div id="mural-overlay">no pieces yet</div>
    </div>
  </div>

</div><!-- /pages -->

<script type="module" src="/src/main.js"></script>
</body>
</html>
