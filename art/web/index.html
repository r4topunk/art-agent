<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Organism</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=Playfair+Display:ital,wght@1,400&display=swap');

:root {
  --bg: #0f0f1a;
  --surface: rgba(255,255,255,0.02);
  --border: rgba(255,255,255,0.06);
  --text: rgba(255,255,255,0.5);
  --text-dim: rgba(255,255,255,0.25);
  --text-bright: rgba(255,255,255,0.8);
  --accent: #6c5ce7;
  --green: #00e436;
  --cyan: #29adff;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 300;
  overflow: hidden;
  height: 100vh;
  width: 100vw;
}

#layout {
  display: grid;
  grid-template-columns: 320px 1fr;
  grid-template-rows: 1fr 80px;
  height: 100vh;
}

/* === LEFT: NEURAL SPINE === */
#spine-col {
  grid-row: 1;
  grid-column: 1;
  padding: 24px 20px 16px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  border-right: 1px solid var(--border);
}

#spine-title {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 13px;
  color: var(--text-dim);
  letter-spacing: 3px;
  margin-bottom: 16px;
}

#spine-scroll {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
#spine-scroll::-webkit-scrollbar { width: 0; }

.layer-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
}
.layer-heatmap {
  flex-shrink: 0;
}
.layer-heatmap canvas {
  display: block;
  width: 240px;
  height: 60px;
  image-rendering: pixelated;
  border: 1px solid var(--border);
  background: #0a0a14;
}
.layer-meta {
  font-size: 9px;
  color: var(--text-dim);
  display: flex;
  flex-direction: column;
  gap: 2px;
  min-width: 40px;
}
.layer-name { color: var(--text); }

/* Connections between layers — thin lines */
.layer-connector {
  width: 240px;
  height: 6px;
  position: relative;
  margin-left: 0;
}
.layer-connector::before {
  content: '';
  position: absolute;
  left: 40px; right: 40px;
  top: 50%;
  height: 1px;
  background: var(--border);
}
.layer-connector .particle-track {
  position: absolute;
  width: 3px;
  height: 3px;
  border-radius: 50%;
  background: var(--accent);
  opacity: 0;
  animation: drift-down 2s linear infinite;
  top: 0;
}
@keyframes drift-down {
  0% { top: 0; opacity: 0; }
  20% { opacity: 0.5; }
  80% { opacity: 0.5; }
  100% { top: 100%; opacity: 0; }
}

/* Embed sim */
#embed-section {
  margin-top: 12px;
  flex-shrink: 0;
}
#embed-label {
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--text-dim);
  text-transform: uppercase;
  margin-bottom: 6px;
}
#embed-canvas {
  display: block;
  width: 128px;
  height: 128px;
  image-rendering: pixelated;
  border: 1px solid var(--border);
}

/* === RIGHT PANEL === */
#right-col {
  grid-row: 1;
  grid-column: 2;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 24px 32px 12px;
  gap: 20px;
  overflow-y: auto;
}
#right-col::-webkit-scrollbar { width: 2px; }
#right-col::-webkit-scrollbar-thumb { background: var(--border); }

/* Phase */
#phase-row {
  display: flex;
  align-items: center;
  gap: 10px;
}
#phase-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 8px var(--accent);
  animation: pdot 2s ease-in-out infinite;
}
@keyframes pdot {
  0%,100% { opacity: 0.4; }
  50% { opacity: 1; }
}
#phase-text {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 14px;
  color: var(--text-dim);
  letter-spacing: 2px;
}

/* Specimen */
#specimen-label {
  font-size: 9px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--text-dim);
}
#best-wrap {
  position: relative;
  border: 1px solid var(--border);
  padding: 6px;
  background: var(--surface);
}
#best-piece {
  width: 256px;
  height: 256px;
  image-rendering: pixelated;
  background: #000;
  display: block;
}
#confidence-overlay {
  position: absolute;
  top: 6px; left: 6px;
  width: 256px;
  height: 256px;
  image-rendering: pixelated;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
  mix-blend-mode: screen;
}
#best-wrap:hover #confidence-overlay { opacity: 0.45; }

#best-meta {
  display: flex;
  gap: 24px;
  font-size: 10px;
  color: var(--text-dim);
}
#best-meta .val { color: var(--text-bright); }

.flash { animation: flashglow 0.8s ease-out; }
@keyframes flashglow {
  0% { box-shadow: 0 0 30px rgba(108,92,231,0.4); }
  100% { box-shadow: none; }
}

/* Gallery */
#gallery-label {
  font-size: 9px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--text-dim);
}
#gallery {
  display: grid;
  grid-template-columns: repeat(6, 48px);
  grid-template-rows: repeat(6, 48px);
  gap: 3px;
}
#gallery canvas {
  width: 48px;
  height: 48px;
  image-rendering: pixelated;
  background: #000;
  border: 1px solid rgba(255,255,255,0.03);
  transition: border-color 0.3s, box-shadow 0.3s;
}
#gallery canvas.selected {
  border-color: var(--green);
  box-shadow: 0 0 8px rgba(0,228,54,0.2);
}

/* === BOTTOM BAR === */
#bottom-bar {
  grid-row: 2;
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  border-top: 1px solid var(--border);
  background: rgba(15,15,26,0.9);
}
.chart-cell {
  flex: 1;
  padding: 10px 20px;
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.chart-title {
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--text-dim);
  text-transform: uppercase;
}
.chart-cell svg { width: 100%; height: 36px; }
.sparkline { fill: none; stroke-width: 1.2; stroke-linecap: round; stroke-linejoin: round; }
.sl-loss { stroke: var(--cyan); }
.sl-grad { stroke: var(--green); }
.sl-glow { stroke-width: 3; opacity: 0.15; }

#stats-cell {
  min-width: 170px;
  padding: 10px 20px;
  display: grid;
  grid-template-columns: auto auto;
  gap: 1px 14px;
  align-content: center;
  border-left: 1px solid var(--border);
}
#stats-cell .label { font-size: 9px; color: var(--text-dim); text-align: right; letter-spacing: 1px; text-transform: uppercase; }
#stats-cell .value { font-size: 11px; color: var(--text-bright); font-variant-numeric: tabular-nums; }

/* Connection indicator */
#conn {
  position: fixed;
  bottom: 90px;
  right: 16px;
  z-index: 10;
  font-size: 9px;
  display: flex;
  align-items: center;
  gap: 5px;
  letter-spacing: 1px;
}
#conn-dot { width: 5px; height: 5px; border-radius: 50%; }
#conn.connected #conn-dot { background: var(--green); box-shadow: 0 0 6px var(--green); }
#conn.connected span { color: var(--text-dim); }
#conn.disconnected #conn-dot { background: #ff2222; }
#conn.disconnected span { color: rgba(255,34,34,0.4); }
</style>
</head>
<body>

<div id="conn" class="disconnected"><div id="conn-dot"></div><span id="conn-text">Disconnected</span></div>

<div id="layout">

<!-- LEFT: SPINE -->
<div id="spine-col">
  <div id="spine-title">neural spine</div>
  <div id="spine-scroll"></div>
  <div id="embed-section">
    <div id="embed-label">color embedding</div>
    <canvas id="embed-canvas" width="8" height="8"></canvas>
  </div>
</div>

<!-- RIGHT -->
<div id="right-col">
  <div id="phase-row"><div id="phase-dot"></div><div id="phase-text">generating</div></div>
  <div id="specimen-label">SPECIMEN</div>
  <div id="best-wrap">
    <canvas id="best-piece" width="16" height="16"></canvas>
    <canvas id="confidence-overlay" width="16" height="16"></canvas>
  </div>
  <div id="best-meta">
    <span>score <span class="val" id="meta-score">—</span></span>
    <span>gen <span class="val" id="meta-gen">—</span></span>
    <span>temp <span class="val" id="meta-temp">—</span></span>
  </div>
  <div id="gallery-label">COLONY</div>
  <div id="gallery"></div>
</div>

<!-- BOTTOM -->
<div id="bottom-bar">
  <div class="chart-cell">
    <div class="chart-title">Loss</div>
    <svg id="loss-chart" viewBox="0 0 200 36" preserveAspectRatio="none">
      <polyline class="sparkline sl-loss sl-glow" points=""/>
      <polyline class="sparkline sl-loss" points=""/>
    </svg>
  </div>
  <div class="chart-cell">
    <div class="chart-title">Gradient</div>
    <svg id="grad-chart" viewBox="0 0 200 36" preserveAspectRatio="none">
      <polyline class="sparkline sl-grad sl-glow" points=""/>
      <polyline class="sparkline sl-grad" points=""/>
    </svg>
  </div>
  <div id="stats-cell">
    <div class="label">Gen</div><div class="value" id="stat-gen">—</div>
    <div class="label">Temp</div><div class="value" id="stat-temp">—</div>
    <div class="label">Loss</div><div class="value" id="stat-loss">—</div>
    <div class="label">Phase</div><div class="value" id="stat-phase">—</div>
  </div>
</div>

</div>

<script>
const PALETTE = [
  [0,0,0],[255,241,232],[255,0,77],[255,163,0],
  [255,236,39],[0,228,54],[41,173,255],[255,119,168],
];
const HEAT = [
  [10,10,46],[26,26,110],[44,95,170],[0,168,158],
  [78,196,78],[200,200,0],[224,102,0],[255,34,34],
];
const N_LAYERS = 6;

let lossHistory = [], gradHistory = [];
let currentGradNorm = 0.5;

// ── Build spine: 6 layer heatmap canvases with connectors ──
const spineScroll = document.getElementById('spine-scroll');
const layerCanvases = [];
const layerNames = ['input','L1','L2','L3','L4','output'];

for (let i = 0; i < N_LAYERS; i++) {
  const wrap = document.createElement('div');
  wrap.className = 'layer-wrap';

  const hm = document.createElement('div');
  hm.className = 'layer-heatmap';
  const canvas = document.createElement('canvas');
  canvas.width = 16; canvas.height = 16;
  hm.appendChild(canvas);
  layerCanvases.push(canvas);

  const meta = document.createElement('div');
  meta.className = 'layer-meta';
  meta.innerHTML = `<span class="layer-name">${layerNames[i]}</span><span class="layer-energy" id="energy-${i}"></span>`;

  wrap.appendChild(hm);
  wrap.appendChild(meta);
  spineScroll.appendChild(wrap);

  // connector between layers (except after last)
  if (i < N_LAYERS - 1) {
    const conn = document.createElement('div');
    conn.className = 'layer-connector';
    // a few animated particles
    for (let p = 0; p < 3; p++) {
      const dot = document.createElement('div');
      dot.className = 'particle-track';
      dot.style.left = (30 + Math.random() * 60) + '%';
      dot.style.animationDelay = (Math.random() * 2) + 's';
      dot.style.animationDuration = (1.5 + Math.random()) + 's';
      conn.appendChild(dot);
    }
    spineScroll.appendChild(conn);
  }
}

// ── Gallery ──
const galleryDiv = document.getElementById('gallery');
const galleryCanvases = [];
for (let i = 0; i < 36; i++) {
  const c = document.createElement('canvas');
  c.width = 16; c.height = 16;
  galleryDiv.appendChild(c);
  galleryCanvases.push(c);
}

// ── Helpers ──
function drawGrid(canvas, grid) {
  if (!grid || !grid.length) return;
  const ctx = canvas.getContext('2d');
  const rows = grid.length, cols = grid[0].length;
  canvas.width = cols; canvas.height = rows;
  const img = ctx.createImageData(cols, rows);
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++) {
      const idx = (r * cols + c) * 4;
      const color = PALETTE[grid[r][c]] || [0,0,0];
      img.data[idx]=color[0]; img.data[idx+1]=color[1]; img.data[idx+2]=color[2]; img.data[idx+3]=255;
    }
  ctx.putImageData(img, 0, 0);
}

function drawHeatmap(canvas, map) {
  if (!map || !map.length) return;
  const ctx = canvas.getContext('2d');
  const rows = map.length, cols = map[0].length;
  canvas.width = cols; canvas.height = rows;
  const flat = map.flat();
  const mx = Math.max(...flat, 0.001);
  const img = ctx.createImageData(cols, rows);
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++) {
      const v = map[r][c] / mx;
      const t = Math.min(1, Math.max(0, v));
      const i = t * 6.99;
      const lo = Math.floor(i), hi = Math.min(7, lo+1);
      const f = i - lo;
      const a = HEAT[lo], b = HEAT[hi];
      const idx = (r * cols + c) * 4;
      img.data[idx]   = Math.round(a[0]+(b[0]-a[0])*f);
      img.data[idx+1] = Math.round(a[1]+(b[1]-a[1])*f);
      img.data[idx+2] = Math.round(a[2]+(b[2]-a[2])*f);
      img.data[idx+3] = 255;
    }
  ctx.putImageData(img, 0, 0);
}

function drawEmbedSim(sim) {
  const canvas = document.getElementById('embed-canvas');
  const ctx = canvas.getContext('2d');
  const n = sim.length;
  canvas.width = n; canvas.height = n;
  const img = ctx.createImageData(n, n);
  for (let r = 0; r < n; r++)
    for (let c = 0; c < n; c++) {
      const v = (sim[r][c] + 1) / 2;
      const t = Math.min(1, Math.max(0, v));
      const i = t * 6.99;
      const lo = Math.floor(i), hi = Math.min(7, lo+1);
      const f = i - lo;
      const a = HEAT[lo], b = HEAT[hi];
      const idx = (r * n + c) * 4;
      img.data[idx]   = Math.round(a[0]+(b[0]-a[0])*f);
      img.data[idx+1] = Math.round(a[1]+(b[1]-a[1])*f);
      img.data[idx+2] = Math.round(a[2]+(b[2]-a[2])*f);
      img.data[idx+3] = 255;
    }
  ctx.putImageData(img, 0, 0);
}

function drawConfidence(canvas, flatConf) {
  if (!flatConf || !flatConf.length) return;
  const ctx = canvas.getContext('2d');
  canvas.width = 16; canvas.height = 16;
  const img = ctx.createImageData(16, 16);
  for (let i = 0; i < 256 && i < flatConf.length; i++) {
    const v = Math.min(1, flatConf[i]);
    const ti = v * 6.99;
    const lo = Math.floor(ti), hi = Math.min(7, lo+1);
    const f = ti - lo;
    const a = HEAT[lo], b = HEAT[hi];
    const idx = i * 4;
    img.data[idx]   = Math.round(a[0]+(b[0]-a[0])*f);
    img.data[idx+1] = Math.round(a[1]+(b[1]-a[1])*f);
    img.data[idx+2] = Math.round(a[2]+(b[2]-a[2])*f);
    img.data[idx+3] = 180;
  }
  ctx.putImageData(img, 0, 0);
}

function updateSparkline(svgId, history, maxLen) {
  const el = document.getElementById(svgId);
  const lines = el.querySelectorAll('polyline');
  const data = history.slice(-maxLen);
  if (data.length < 2) return;
  const max = Math.max(...data, 0.001), min = Math.min(...data);
  const range = max - min || 0.001;
  const pts = data.map((v, i) => `${(i/(maxLen-1))*200},${34-((v-min)/range)*32}`).join(' ');
  lines.forEach(l => l.setAttribute('points', pts));
}

// ── WebSocket ──
function connect() {
  const ws = new WebSocket(`ws://${location.hostname||'localhost'}:8765`);
  ws.onopen = () => {
    document.getElementById('conn').className = 'connected';
    document.getElementById('conn-text').textContent = 'Linked';
  };
  ws.onclose = () => {
    document.getElementById('conn').className = 'disconnected';
    document.getElementById('conn-text').textContent = 'Disconnected';
    setTimeout(connect, 2500);
  };
  ws.onerror = () => ws.close();
  ws.onmessage = e => { const m = JSON.parse(e.data); handle(m.event, m.data); };
}

function setPhase(p) {
  document.getElementById('phase-text').textContent = p;
  document.getElementById('stat-phase').textContent = p;
  const dot = document.getElementById('phase-dot');
  const c = {training:'#29adff',generating:'#6c5ce7',scoring:'#00e436',finetuning:'#ffa300'}[p]||'#6c5ce7';
  dot.style.background = c;
  dot.style.boxShadow = `0 0 8px ${c}`;
  // tint connector particles
  document.querySelectorAll('.particle-track').forEach(d => d.style.background = c);
}

function handle(event, data) {
  switch (event) {
  case 'train_start': setPhase('training'); break;

  case 'train_step': {
    lossHistory.push(data.loss);
    gradHistory.push(data.grad_norm||0);
    if (lossHistory.length > 500) lossHistory = lossHistory.slice(-300);
    if (gradHistory.length > 500) gradHistory = gradHistory.slice(-300);
    currentGradNorm = data.grad_norm||0;
    document.getElementById('stat-loss').textContent = data.loss.toFixed(4);
    updateSparkline('loss-chart', lossHistory, 200);
    updateSparkline('grad-chart', gradHistory, 200);
    break;
  }

  case 'neural_activity': {
    const { layer_maps, embedding_sim, weight_norms } = data;
    for (let li = 0; li < Math.min(layer_maps.length, N_LAYERS); li++) {
      drawHeatmap(layerCanvases[li], layer_maps[li]);
    }
    if (weight_norms) {
      const mx = Math.max(...weight_norms, 0.001);
      for (let i = 0; i < weight_norms.length; i++) {
        const el = document.getElementById(`energy-${i}`);
        if (el) el.textContent = (weight_norms[i]/mx*100).toFixed(0) + '%';
      }
    }
    if (embedding_sim) drawEmbedSim(embedding_sim);
    break;
  }

  case 'gen_start':
    setPhase('generating');
    document.getElementById('stat-gen').textContent = data.generation;
    document.getElementById('stat-temp').textContent = data.temperature.toFixed(3);
    document.getElementById('meta-gen').textContent = data.generation;
    document.getElementById('meta-temp').textContent = data.temperature.toFixed(3);
    galleryCanvases.forEach(c => { c.getContext('2d').clearRect(0,0,16,16); c.classList.remove('selected'); });
    break;

  case 'gen_progress': {
    const { grids } = data;
    for (let i = 0; i < Math.min(grids.length, 36); i++) if (grids[i]) drawGrid(galleryCanvases[i], grids[i]);
    break;
  }

  case 'gen_pieces': {
    for (let i = 0; i < Math.min(data.pieces.length, 36); i++) drawGrid(galleryCanvases[i], data.pieces[i]);
    break;
  }

  case 'gen_confidences': {
    if (data.confidences && data.confidences[0])
      drawConfidence(document.getElementById('confidence-overlay'), data.confidences[0]);
    break;
  }

  case 'scoring_start': setPhase('scoring'); break;

  case 'gen_scored': {
    const { pieces, scores } = data;
    let bestIdx = 0, bestVal = -1;
    for (let i = 0; i < scores.length; i++) { const s = scores[i].composite||0; if (s>bestVal){bestVal=s;bestIdx=i;} }
    if (pieces[bestIdx]) {
      drawGrid(document.getElementById('best-piece'), pieces[bestIdx]);
      document.getElementById('meta-score').textContent = bestVal.toFixed(3);
      const w = document.getElementById('best-wrap');
      w.classList.remove('flash'); void w.offsetWidth; w.classList.add('flash');
    }
    break;
  }

  case 'gen_selected': {
    galleryCanvases.forEach(c => c.classList.remove('selected'));
    if (data.indices) data.indices.forEach(i => { if (i<galleryCanvases.length) galleryCanvases[i].classList.add('selected'); });
    break;
  }

  case 'finetune_start': setPhase('finetuning'); break;
  case 'train_end': break;
  case 'saving_complete': break;

  case 'gen_complete': {
    const s = data.summary;
    if (s) { document.getElementById('stat-gen').textContent=s.generation; document.getElementById('stat-temp').textContent=s.temperature.toFixed(3); }
    break;
  }

  case 'init_phase':
    document.getElementById('phase-text').textContent = data.phase||'initializing';
    document.getElementById('stat-phase').textContent = data.phase||'init';
    break;

  case 'evolution_step': break;
  }
}

connect();
</script>
</body>
</html>
